name: Release

# Triggers only when you push a version tag (e.g. v0.1.2)
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Test, build and publish
    runs-on: ubuntu-latest

    # Required for npm Trusted Publishing via OIDC
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Check out the code at the tagged commit
      - name: Checkout
        uses: actions/checkout@v4

      # 2. pnpm must be set up before Node so setup-node's pnpm cache works
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      # 3. Node 22+ is required for npm Trusted Publishing
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          cache: 'pnpm'

      # 4. Belt-and-suspenders: ensure npm >= 11.5.1 for trusted publishing
      - name: Upgrade npm
        run: npm install -g npm@latest

      # 5. Fail fast if the git tag doesn't match package.json's version
      - name: Verify tag matches package.json version
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION=${GITHUB_REF_NAME#v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Tag v$TAG_VERSION does not match package.json version $PKG_VERSION"
            exit 1
          fi

      # 6. Install dependencies from the lockfile — never updates it
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 7. Run the full test suite — publish is blocked if any test fails
      - name: Run tests
        run: pnpm test

      # 8. Compile src/ → dist/
      - name: Build
        run: pnpm run build

      # 9. Publish via OIDC — provenance is generated automatically
      - name: Publish to npm
        run: npm publish --access public