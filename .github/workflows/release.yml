name: Release

# Triggers only when you push a version tag (e.g. v0.1.2)
on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    name: Test, build and publish
    runs-on: ubuntu-latest

    # Required for npm Trusted Publishing via OIDC
    permissions:
      contents: read
      id-token: write

    steps:
      # 1. Check out the code at the tagged commit
      - name: Checkout
        uses: actions/checkout@v4

      # 2. Set up Node.js — matches the engine you develop with locally
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: 'https://registry.npmjs.org'

      # 3. Set up pnpm
      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      # 4. Install dependencies from the lockfile — never updates it
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 5. Run the full test suite — publish is blocked if any test fails
      - name: Run tests
        run: pnpm test

      # 6. Compile src/ → dist/
      - name: Build
        run: pnpm run build

      # 7. Publish via OIDC — no NPM_TOKEN needed
      - name: Publish to npm
        run: npm publish --provenance --access public
